spring.application.name=SportRadar
spring.datasource.url=jdbc:postgresql://localhost:5432/sportradar_db
spring.datasource.username=${DB_USERNAME:"your db username"}
spring.datasource.password=${DB_PASSWORD:"your db password"}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true