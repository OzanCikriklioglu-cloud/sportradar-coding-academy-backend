version: '3.8'

services:

  db:
    image: postgres:15
    container_name: sportradar-db
    environment:
      POSTGRES_DB: sportradar_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sportradar-network

  app:
    build: ./backend
    container_name: sportradar-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sportradar_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_CONFIG_IMPORT: "optional:file:/app/.env.properties"
      SPRING_SQL_INIT_MODE: always
    networks:
      - sportradar-network

networks:
  sportradar-network:
    driver: bridge
